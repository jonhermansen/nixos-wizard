name: Build

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 1 */3 *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v21

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build
        run: nix build .#isoImage

      - name: Publish
        uses: actions/upload-artifact@v7
        with:
          name: nixos-iso
          path: result/iso/*.iso
